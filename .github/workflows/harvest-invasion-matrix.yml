name: Harvest Invasion Matrix

on:
  push:
    branches:
      - codex/harvest-remote-sweeps
      - codex/harvest-remote-stagec
      - codex/harvest-architecture-stagec
      - codex/harvest-capability-ladder-stageb
      - codex/harvest-institutional-alignment
      - codex/harvest-institutional-regulated-fishery
      - codex/harvest-institutional-community-irrigation
      - codex/harvest-institutional-forest-co-management
  workflow_dispatch:
    inputs:
      stage:
        description: "Which Harvest invasion sweep to run"
        required: true
        type: choice
        options:
          - stage_b_pilot
          - stage_c_highpower
          - architecture_stageB
          - architecture_stageC
          - capability_ladder_stageB
          - institutional_friction_moduleA
          - institutional_friction_regulated_fishery
          - institutional_friction_community_irrigation
          - institutional_friction_forest_co_management
      python_version:
        description: "Python version"
        required: false
        default: "3.11"
        type: string

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      run_name: ${{ steps.build.outputs.run_name }}
      summary_prefix: ${{ steps.build.outputs.summary_prefix }}
      plot_mode: ${{ steps.build.outputs.plot_mode }}
      ci_plot_filter: ${{ steps.build.outputs.ci_plot_filter }}
    steps:
      - uses: actions/checkout@v4
      - id: build
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import itertools

          from experiments.harvest_invasion_presets import github_matrix_payload

          stage = os.environ["STAGE"]
          if stage == "stage_b_pilot":
              tiers = ["easy_h1", "medium_h1", "hard_h1"]
              partner_mixes = ["cooperative_heavy", "balanced", "adversarial_heavy"]
              conditions = ["none", "top_down_only", "bottom_up_only", "hybrid"]
              injector_modes = ["random", "mutation", "adversarial_heuristic"]
              pressures = [0.3]
              common = {
                  "n_runs": 3,
                  "generations": 12,
                  "population_size": 6,
                  "seeds_per_generation": 24,
                  "test_seeds_per_generation": 24,
                  "replacement_fraction": 0.2,
              }
              ci_plot_filter = ""
              run_name = "harvest_invasion_stageB_pilot_gh"
          elif stage == "stage_c_highpower":
              tiers = ["medium_h1", "hard_h1"]
              partner_mixes = ["balanced", "adversarial_heavy"]
              conditions = ["top_down_only", "hybrid"]
              injector_modes = ["mutation", "adversarial_heuristic"]
              pressures = [0.3, 0.5]
              common = {
                  "n_runs": 8,
                  "generations": 15,
                  "population_size": 6,
                  "seeds_per_generation": 32,
                  "test_seeds_per_generation": 32,
                  "replacement_fraction": 0.2,
              }
              ci_plot_filter = "--tiers medium_h1,hard_h1 --partner-mixes balanced,adversarial_heavy --injector-modes mutation,adversarial_heuristic --pressures 0.3,0.5"
              run_name = "harvest_invasion_stageC_highpower_gh"
              plot_mode = "legacy"
          elif stage in {
              "architecture_stageB",
              "architecture_stageC",
              "capability_ladder_stageB",
              "institutional_friction_moduleA",
              "institutional_friction_regulated_fishery",
              "institutional_friction_community_irrigation",
              "institutional_friction_forest_co_management",
          }:
              payload = github_matrix_payload(stage)
              matrix = json.dumps(payload["matrix"])
              print(f"matrix={matrix}")
              print(f"run_name={payload['run_name']}")
              print(f"summary_prefix={payload['summary_prefix']}")
              print(f"plot_mode={payload['plot_mode']}")
              print(f"ci_plot_filter={payload['ci_plot_filter']}")
              raise SystemExit(0)
          else:
              raise ValueError(f"Unknown stage: {stage}")

          include = []
          for tier, partner_mix, condition, injector_mode, pressure in itertools.product(
              tiers, partner_mixes, conditions, injector_modes, pressures
          ):
              slug = f"{tier}__{partner_mix}__{condition}__{injector_mode}__p{pressure:.1f}".replace(".", "p")
              include.append(
                  {
                      "tier": tier,
                      "partner_mix": partner_mix,
                      "condition": condition,
                      "injector_mode": injector_mode,
                      "pressure": pressure,
                      "slug": slug,
                      **common,
                  }
              )

          matrix = json.dumps({"include": include})
          summary_prefix = f"results/runs/showcase/curated/{run_name}"
          print(f"matrix={matrix}")
          print(f"run_name={run_name}")
          print(f"summary_prefix={summary_prefix}")
          print("plot_mode=legacy")
          print(f"ci_plot_filter={ci_plot_filter}")
          PY
        env:
          STAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.stage || (github.ref_name == 'codex/harvest-remote-stagec' && 'stage_c_highpower' || github.ref_name == 'codex/harvest-architecture-stagec' && 'architecture_stageC' || github.ref_name == 'codex/harvest-capability-ladder-stageb' && 'capability_ladder_stageB' || github.ref_name == 'codex/harvest-institutional-regulated-fishery' && 'institutional_friction_regulated_fishery' || github.ref_name == 'codex/harvest-institutional-community-irrigation' && 'institutional_friction_community_irrigation' || github.ref_name == 'codex/harvest-institutional-forest-co-management' && 'institutional_friction_forest_co_management' || 'stage_b_pilot') }}

  run-shards:
    needs: define-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
        if: ${{ github.event_name == 'workflow_dispatch' }}

      - uses: actions/setup-python@v5
        if: ${{ github.event_name == 'push' }}
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib tqdm

      - name: Run shard
        run: |
          python -m experiments.run_harvest_invasion_matrix \
            --tiers "${{ matrix.tier }}" \
            --partner-mixes "${{ matrix.partner_mix }}" \
            --scenario-presets "${{ matrix.scenario_preset }}" \
            --conditions "${{ matrix.condition }}" \
            --injector-modes "${{ matrix.injector_mode }}" \
            --adversarial-pressures "${{ matrix.pressure }}" \
            --governance-friction-regimes "${{ matrix.governance_friction_regime }}" \
            --n-runs "${{ matrix.n_runs }}" \
            --generations "${{ matrix.generations }}" \
            --population-size "${{ matrix.population_size }}" \
            --seeds-per-generation "${{ matrix.seeds_per_generation }}" \
            --test-seeds-per-generation "${{ matrix.test_seeds_per_generation }}" \
            --replacement-fraction "${{ matrix.replacement_fraction }}" \
            --max-workers 1 \
            --output-prefix "results/runs/harvest_invasion/gh/${{ needs.define-matrix.outputs.run_name }}/${{ matrix.slug }}" \
            --experiment-tag "${{ needs.define-matrix.outputs.run_name }}"

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: harvest-invasion-${{ matrix.slug }}
          path: |
            results/runs/harvest_invasion/gh/${{ needs.define-matrix.outputs.run_name }}/${{ matrix.slug }}_runs.csv
            results/runs/harvest_invasion/gh/${{ needs.define-matrix.outputs.run_name }}/${{ matrix.slug }}_generation_history.csv
            results/runs/harvest_invasion/gh/${{ needs.define-matrix.outputs.run_name }}/${{ matrix.slug }}_strategy_history.csv
            results/runs/harvest_invasion/gh/${{ needs.define-matrix.outputs.run_name }}/${{ matrix.slug }}_agent_history.csv

  aggregate:
    needs: [define-matrix, run-shards]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          python-version: ${{ inputs.python_version }}

      - uses: actions/setup-python@v5
        if: ${{ github.event_name == 'push' }}
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib tqdm

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: harvest-invasion-*
          path: downloaded
          merge-multiple: false

      - name: Merge shard CSVs
        run: |
          python -m experiments.merge_harvest_invasion_outputs \
            --input-dir downloaded \
            --output-prefix "results/runs/harvest_invasion/curated/${{ needs.define-matrix.outputs.run_name }}"

      - name: Summarize merged outputs
        run: |
          python -m experiments.summarize_harvest_invasion \
            --runs-csv "results/runs/harvest_invasion/curated/${{ needs.define-matrix.outputs.run_name }}_runs.csv" \
            --agent-history-csv "results/runs/harvest_invasion/curated/${{ needs.define-matrix.outputs.run_name }}_agent_history.csv" \
            --output-prefix "${{ needs.define-matrix.outputs.summary_prefix }}"

      - name: Plot merged outputs (legacy)
        if: ${{ needs.define-matrix.outputs.plot_mode == 'legacy' }}
        env:
          MPLCONFIGDIR: /tmp/mpl
          XDG_CACHE_HOME: /tmp
        run: |
          python -m experiments.plot_harvest_invasion \
            --ci-csv "${{ needs.define-matrix.outputs.summary_prefix }}_ci.csv" \
            --output-prefix "${{ needs.define-matrix.outputs.summary_prefix }}" \
            ${{ needs.define-matrix.outputs.ci_plot_filter }}

      - name: Plot merged outputs (institutional)
        if: ${{ needs.define-matrix.outputs.plot_mode == 'institutional' }}
        env:
          MPLCONFIGDIR: /tmp/mpl
          XDG_CACHE_HOME: /tmp
        run: |
          python -m experiments.plot_harvest_architecture_followup \
            --ranking-csv "${{ needs.define-matrix.outputs.summary_prefix }}_ranking.csv" \
            --contrast-ci-csv "${{ needs.define-matrix.outputs.summary_prefix }}_contrast_ci.csv" \
            --capability-ladder-csv "${{ needs.define-matrix.outputs.summary_prefix }}_capability_ladder.csv" \
            --aggression-summary-csv "${{ needs.define-matrix.outputs.summary_prefix }}_aggression_summary.csv" \
            --targeting-summary-csv "${{ needs.define-matrix.outputs.summary_prefix }}_targeting_summary.csv" \
            --output-prefix "${{ needs.define-matrix.outputs.summary_prefix }}"

      - name: Upload merged artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.define-matrix.outputs.run_name }}-bundle
          path: |
            results/runs/harvest_invasion/curated/${{ needs.define-matrix.outputs.run_name }}_runs.csv
            results/runs/harvest_invasion/curated/${{ needs.define-matrix.outputs.run_name }}_generation_history.csv
            results/runs/harvest_invasion/curated/${{ needs.define-matrix.outputs.run_name }}_strategy_history.csv
            results/runs/harvest_invasion/curated/${{ needs.define-matrix.outputs.run_name }}_agent_history.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_table.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_ranking.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_delta.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_ci.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_contrast_delta.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_contrast_ci.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_capability_ladder.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_aggression_groups.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_aggression_deltas.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_aggression_summary.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_targeting_groups.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_targeting_deltas.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_targeting_summary.csv
            ${{ needs.define-matrix.outputs.summary_prefix }}_summary.md
            ${{ needs.define-matrix.outputs.summary_prefix }}_main.png
            ${{ needs.define-matrix.outputs.summary_prefix }}_mechanisms.png
            ${{ needs.define-matrix.outputs.summary_prefix }}_architecture.png
            ${{ needs.define-matrix.outputs.summary_prefix }}_architecture_contrasts.png
            ${{ needs.define-matrix.outputs.summary_prefix }}_capability_ladder.png
            ${{ needs.define-matrix.outputs.summary_prefix }}_welfare_incidence.png
